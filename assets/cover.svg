<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1b26"/>
      <stop offset="50%" style="stop-color:#24283b"/>
      <stop offset="100%" style="stop-color:#1a1b26"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7aa2f7"/>
      <stop offset="100%" style="stop-color:#bb9af7"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9ece6a"/>
      <stop offset="100%" style="stop-color:#73daca"/>
    </linearGradient>
    <linearGradient id="node" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#539e43"/>
      <stop offset="100%" style="stop-color:#76c761"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)" rx="12"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03" stroke="#7aa2f7" stroke-width="1">
    <line x1="0" y1="40" x2="1200" y2="40"/>
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="280" x2="1200" y2="280"/>
    <line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="40" y1="0" x2="40" y2="400"/>
    <line x1="80" y1="0" x2="80" y2="400"/>
    <line x1="120" y1="0" x2="120" y2="400"/>
    <line x1="160" y1="0" x2="160" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="240" y1="0" x2="240" y2="400"/>
    <line x1="280" y1="0" x2="280" y2="400"/>
    <line x1="320" y1="0" x2="320" y2="400"/>
    <line x1="360" y1="0" x2="360" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="440" y1="0" x2="440" y2="400"/>
    <line x1="480" y1="0" x2="480" y2="400"/>
    <line x1="520" y1="0" x2="520" y2="400"/>
    <line x1="560" y1="0" x2="560" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="640" y1="0" x2="640" y2="400"/>
    <line x1="680" y1="0" x2="680" y2="400"/>
    <line x1="720" y1="0" x2="720" y2="400"/>
    <line x1="760" y1="0" x2="760" y2="400"/>
    <line x1="800" y1="0" x2="800" y2="400"/>
    <line x1="840" y1="0" x2="840" y2="400"/>
    <line x1="880" y1="0" x2="880" y2="400"/>
    <line x1="920" y1="0" x2="920" y2="400"/>
    <line x1="960" y1="0" x2="960" y2="400"/>
    <line x1="1000" y1="0" x2="1000" y2="400"/>
    <line x1="1040" y1="0" x2="1040" y2="400"/>
    <line x1="1080" y1="0" x2="1080" y2="400"/>
    <line x1="1120" y1="0" x2="1120" y2="400"/>
    <line x1="1160" y1="0" x2="1160" y2="400"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="100" cy="80" r="60" fill="#7aa2f7" opacity="0.04"/>
  <circle cx="1100" cy="320" r="80" fill="#bb9af7" opacity="0.04"/>
  <circle cx="950" cy="60" r="40" fill="#9ece6a" opacity="0.04"/>

  <!-- Neovim icon (simplified) -->
  <g transform="translate(340, 100)" filter="url(#softglow)">
    <!-- Neovim green parallelogram -->
    <polygon points="0,0 35,0 80,120 45,120" fill="url(#green)" opacity="0.9"/>
    <!-- Neovim blue parallelogram -->
    <polygon points="80,0 115,0 70,120 35,120" fill="url(#accent)" opacity="0.9"/>
    <!-- Small accent -->
    <polygon points="80,0 95,0 95,30 80,30" fill="#9ece6a" opacity="0.7"/>
  </g>

  <!-- Plus sign -->
  <g transform="translate(490, 140)" filter="url(#glow)">
    <rect x="15" y="0" width="10" height="40" fill="#565f89" rx="3"/>
    <rect x="0" y="15" width="40" height="10" fill="#565f89" rx="3"/>
  </g>

  <!-- Node.js hexagon -->
  <g transform="translate(560, 95)" filter="url(#softglow)">
    <polygon points="60,0 115,30 115,90 60,120 5,90 5,30" fill="none" stroke="url(#node)" stroke-width="3" opacity="0.9"/>
    <!-- JS text inside -->
    <text x="60" y="72" text-anchor="middle" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace" font-size="36" font-weight="bold" fill="#76c761">JS</text>
  </g>

  <!-- Plus sign -->
  <g transform="translate(700, 140)" filter="url(#glow)">
    <rect x="15" y="0" width="10" height="40" fill="#565f89" rx="3"/>
    <rect x="0" y="15" width="40" height="10" fill="#565f89" rx="3"/>
  </g>

  <!-- AI sparkle icon -->
  <g transform="translate(770, 105)" filter="url(#softglow)">
    <path d="M55,0 L65,40 L105,55 L65,70 L55,110 L45,70 L5,55 L45,40 Z" fill="none" stroke="#bb9af7" stroke-width="2.5" opacity="0.9"/>
    <path d="M55,25 L61,45 L80,55 L61,65 L55,85 L49,65 L30,55 L49,45 Z" fill="#bb9af7" opacity="0.3"/>
    <!-- AI text -->
    <text x="55" y="62" text-anchor="middle" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace" font-size="22" font-weight="bold" fill="#bb9af7">AI</text>
  </g>

  <!-- Title -->
  <text x="600" y="290" text-anchor="middle" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', 'Cascadia Code', monospace" font-size="38" font-weight="bold" fill="url(#accent)" filter="url(#glow)">lazyvim-nodejs-setup</text>

  <!-- Subtitle -->
  <text x="600" y="330" text-anchor="middle" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', 'Cascadia Code', monospace" font-size="16" fill="#a9b1d6" opacity="0.8">LazyVim + Node.js/TypeScript + AI-Powered Development</text>

  <!-- Bottom accent line -->
  <rect x="350" y="355" width="500" height="2" fill="url(#accent)" opacity="0.3" rx="1"/>

  <!-- Tech badges -->
  <g transform="translate(370, 368)" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace" font-size="11" fill="#565f89">
    <text x="0" y="0">neovim</text>
    <circle cx="58" cy="-3" r="2" fill="#565f89" opacity="0.5"/>
    <text x="70" y="0">typescript</text>
    <circle cx="148" cy="-3" r="2" fill="#565f89" opacity="0.5"/>
    <text x="160" y="0">copilot</text>
    <circle cx="218" cy="-3" r="2" fill="#565f89" opacity="0.5"/>
    <text x="230" y="0">claude</text>
    <circle cx="282" cy="-3" r="2" fill="#565f89" opacity="0.5"/>
    <text x="294" y="0">mcp</text>
    <circle cx="328" cy="-3" r="2" fill="#565f89" opacity="0.5"/>
    <text x="340" y="0">monorepo</text>
  </g>
</svg>
